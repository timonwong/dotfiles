codex:
  # Codex CLI Provider Configuration
  # Docs: https://developers.openai.com/codex/config-reference

  # ===== Provider Definitions =====
  providers:
    # Native OpenAI (OAuth, no API key needed)
    openai:
      models:
        - gpt-5.2-codex
        - gpt-5.2
    # Third-party OpenAI-compatible providers
    deepseek:
      base_url: https://api.deepseek.com/v1
      models:
        - deepseek-chat
        - deepseek-reasoner
    kimi:
      base_url: https://api.moonshot.ai/v1
      models:
        - kimi-k2-0711-preview
    glm:
      base_url: https://open.bigmodel.cn/api/paas/v4
      models:
        - glm-4.5
    qwen:
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      models:
        - qwen3-coder-plus
    minimax:
      base_url: https://api.minimax.io/v1
      models:
        - MiniMax-M2.1
    doubao:
      base_url: https://ark.cn-beijing.volces.com/api/v3
      models:
        - doubao-seed-1-6-thinking-250715
    naapi:
      base_url: https://na.wanxiaot.com/v1
      models:
        - gpt-5.2
        - gpt-5.2-codex
        - gpt-5.3-codex
  # ===== Account Configurations =====
  # Format: provider or provider@account
  # Fields: model, provider(optional override)
  accounts:
    openai:
      provider: openai
      model: gpt-5.2-codex
    deepseek@smoke:
      provider: deepseek
      model: deepseek-chat
    naapi@private:
      provider: naapi
      model: gpt-5.2
  # ===== Shared Skills =====
  # All skills are hardcoded in .chezmoiexternal.toml.tmpl
  # ===== Global Defaults =====
  defaults:
    # Approval policy: untrusted | on-failure | on-request | never
    approval_policy: never
    # Sandbox mode: read-only | workspace-write | danger-full-access
    sandbox_mode: danger-full-access
    # Model reasoning effort: none | minimal | low | medium | high | xhigh
    model_reasoning_effort: xhigh
    # Network access: enabled | disabled
    network_access: enabled
    # Disable response storage
    disable_response_storage: true
    # WSL setup acknowledgement
    windows_wsl_setup_acknowledged: true
    # Personality: none | friendly | pragmatic
    personality: pragmatic
    # Model verbosity: low | medium | high
    model_verbosity: high
    # Web search mode: disabled | cached | live
    # Deprecated in Codex config output; use features.web_search_request
    # web_search: live
    # Suppress unstable feature warnings
    suppress_unstable_features_warning: true
  # ===== Feature Flags =====
  features:
    shell_tool: true
    memory_tool: true
    apply_patch_freeform: true
    unified_exec: true
    shell_snapshot: true
    runtime_metrics: true
    undo: true
    request_rule: true
    responses_websockets: false
    remote_compaction: true
    remote_models: true
    skill_mcp_dependency_install: true
    skill_env_var_dependency_prompt: true
    web_search_request: true
  # ===== Tool Toggles =====
  tools:
    view_image: true
  # ===== Shell Environment Policy =====
  shell_environment_policy:
    inherit: all
    exclude: []
    ignore_default_excludes: true
    experimental_use_profile: true
  # ===== History Settings =====
  history:
    # persistence: save-all | none
    persistence: save-all
    # max_bytes: maximum history file size
    max_bytes: 104857600
  # ===== TUI Settings =====
  tui:
    notifications: true
    animations: true
    show_tooltips: true
  # ===== Project Documentation =====
  project_doc:
    # Fallback filenames for AGENTS.md discovery
    fallback_filenames:
      - CLAUDE.md
      - TEAM_GUIDE.md
      - .agents.md
      - CODEX.md
    # Max bytes for combined AGENTS.md content
    max_bytes: 65536
  # ===== Profiles =====
  profiles:
    fast:
      model_reasoning_effort: low
      approval_policy: never
    deep-review:
      model_reasoning_effort: xhigh
      approval_policy: on-request
    research:
      web_search: live
      model_reasoning_effort: high
  # ===== MCP Servers =====
  # Managed directly in dot_codex/config.toml.tmpl
