# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

shell = "zsh"

[plugins]
[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"
defer-more = """{{ hooks?.pre | nl }}{% for file in files %}zsh-defer -t 0.5 source "{{ file }}"\n{% endfor %}{{ hooks?.post | nl }}"""

[plugins.zsh-autosuggestions]
apply = ["defer"]
github = 'zsh-users/zsh-autosuggestions'
use = ['{{ name }}.zsh']
[plugins.zsh-autosuggestions.hooks]
post = """
zsh-defer -c '
# Autosuggestions keybindings
bindkey "^ " autosuggest-accept   # Ctrl+Space: accept suggestion (fill command line)
bindkey "^w" autosuggest-execute  # Ctrl+W: execute suggestion directly
'
"""

[plugins.clipboard]
apply = ["defer"]
github = 'zpm-zsh/clipboard'

[plugins.zsh-you-should-use]
apply = ["defer"]
github = 'MichaelAquilina/zsh-you-should-use'

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
apply = ["fpath", "defer"]

[plugins.ripgrep-shell-completions]
apply = ["fpath", "defer"]
remote = "https://github.com/BurntSushi/ripgrep/raw/master/crates/core/flags/complete/rg.zsh"

[plugins.zellij-completions]
inline = """
if command -v zellij > /dev/null; then
  zellij setup --generate-completion zsh > ~/.config/sheldon/completions/_zellij
fi
"""

[plugins.completions]
local = "~/.config/sheldon/completions"
apply = ["fpath", "defer"]

[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"

# fzf-tab: replaces default completion menu with fzf
[plugins.fzf-tab]
github = 'Aloxaf/fzf-tab'

[plugins.compinit]
inline = 'autoload -Uz compinit && zsh-defer compinit'
