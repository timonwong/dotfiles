name: OpenSpec Trace Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trace-gate:
    name: trace-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enforce OpenSpec trace policy
        run: bash .github/scripts/check_openspec_trace_gate.sh
