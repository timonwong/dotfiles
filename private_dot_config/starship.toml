# Use the color palette
palette = "catppuccin_mocha"
right_format = "$custom.worktree"

# Define the Catppuccin Mocha color palette
[palettes.catppuccin_mocha]
background = "#1e1e2e"
current_line = "#313244"
foreground = "#cdd6f4"
comment = "#6c7086"
cyan = "#89dceb"
green = "#a6e3a1"
orange = "#fab387"
pink = "#f5c2e7"
purple = "#cba6f7"
red = "#f38ba8"
yellow = "#f9e2af"

# Prompt character
[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"

# Command duration
[cmd_duration]
disabled = true
style = "bold yellow"

[custom.worktree]
command = '''
top="$(git rev-parse --show-toplevel 2>/dev/null)" || exit 0
case "$top" in
    */.worktrees/*)
        name="${top#*"/.worktrees/"}"
        printf "wt:%s" "$name"
        ;;
esac
'''
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[$output]($style)"
style = "bold purple"
shell = ["bash", "--noprofile", "--norc"]

