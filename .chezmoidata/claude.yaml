claude:
  # Claude Code Provider Configuration
  # Docs: https://docs.anthropic.com/zh-CN/docs/claude-code/settings
  #
  # Structure:
  #   - defaults: Global default settings (accounts can override)
  #   - providers: Provider definitions (base_url + available models)
  #   - accounts: Account configurations (model selection + settings)
  #
  # API keys stored in gopass: claude-code/providers/{provider}/{account}/api_key

  # ===== Global Defaults =====
  defaults:
    timeout_ms: 600000
  # ===== Provider Definitions =====
  # Only base_url and available models list
  providers:
    # Native Anthropic (OAuth, no API key needed)
    anthropic:
      models:
        - claude-opus-4-6
        - claude-sonnet-4-5-20250929
        - claude-haiku-4-5-20251001
    # DeepSeek: https://api-docs.deepseek.com/guides/anthropic_api
    deepseek:
      base_url: https://api.deepseek.com/anthropic
      models:
        - deepseek-chat
        - deepseek-reasoner
    # Kimi K2 (Moonshot): https://github.com/MoonshotAI/kimi-cli/blob/main/docs/en/configuration/providers.md
    kimi:
      base_url: https://api.kimi.com/coding
      models:
        - kimi-k2.5
        - kimi-k2
    # GLM (Zhipu AI): https://docs.bigmodel.cn/cn/guide/develop/claude
    glm:
      base_url: https://open.bigmodel.cn/api/anthropic
      models:
        - glm-4.7
        - glm-4.5-air
    # Qwen (Alibaba): https://help.aliyun.com/zh/model-studio/claude-code
    qwen:
      base_url: https://dashscope.aliyuncs.com/apps/anthropic
      models:
        - qwen3-coder-plus
        - qwen3-max
        - qwen-flash
    # MiniMax: https://platform.minimax.io/docs/coding-plan/claude-code
    minimax:
      base_url: https://api.minimax.io/anthropic
      models:
        - MiniMax-M2.1
    # Doubao (ByteDance): https://www.volcengine.com/docs/82379/1928261
    doubao:
      base_url: https://ark.cn-beijing.volces.com/api/coding
      models:
        - ark-code-latest
    wanxiaot:
      base_url: https://na.wanxiaot.com
      models:
        - claude-opus-4-6
        - claude-opus-4-6-thinking
        - claude-sonnet-4-5-20250929
        - claude-sonnet-4-5-20250929-thinking
        - claude-haiku-4-5-20251001
  # ===== Account Configurations =====
  # Format: provider or provider@account
  # Fields: model, small_model, haiku_model, sonnet_model, opus_model, timeout_ms
  accounts:
    # Native Anthropic accounts (use OAuth)
    anthropic:
      model: claude-opus-4-6
      small_model: claude-sonnet-4-5-20250929
    opus:
      provider: anthropic
      model: claude-opus-4-6
      small_model: claude-opus-4-6
    haiku:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      small_model: claude-haiku-4-5-20251001
    # Third-party accounts (format: provider@label)
    # Add your own: deepseek@work, kimi@personal, etc.
    doubao@private:
      model: kimi-k2.5
      small_model: kimi-k2.5
      haiku_model: kimi-k2.5
      sonnet_model: kimi-k2.5
      opus_model: kimi-k2.5
    kimi@private:
      model: kimi-k2.5
      small_model: kimi-k2.5
      haiku_model: kimi-k2.5
      sonnet_model: kimi-k2.5
      opus_model: kimi-k2.5
    wanxiaot@private:
      provider: wanxiaot
      model: gpt-5.2-codex
      small_model: claude-opus-4-6
      haiku_model: claude-opus-4-6
      sonnet_model: claude-opus-4-6
      opus_model: gpt-5.2-codex
  # ==========================================================================
  # Claude Code Plugins (downloaded via .chezmoiexternal.toml.tmpl)
  # All skills are hardcoded in .chezmoiexternal.toml.tmpl
  # ==========================================================================
