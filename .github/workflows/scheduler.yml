name: Scheduler
on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  actions: write
  contents: read
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger update-flake-lock
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run update-flake-lock.yml --repo ${{ github.repository }}
          echo "Triggered update-flake-lock.yml"
      - name: Trigger update-versions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run update-versions.yml --repo ${{ github.repository }}
          echo "Triggered update-versions.yml"
      - name: Trigger update-aqua-packages
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run update-aqua-packages.yml --repo ${{ github.repository }}
          echo "Triggered update-aqua-packages.yml"
      - name: Summary
        run: |
          echo "## Scheduler Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Daily workflows triggered: true" >> "$GITHUB_STEP_SUMMARY"
