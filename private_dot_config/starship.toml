# Use the color palette
palette = "dracula"
right_format = "$custom.worktree"

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

# Prompt character
[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"

# Command duration
[cmd_duration]
disabled = true
style = "bold yellow"

[custom.worktree]
command = '''
top="$(git rev-parse --show-toplevel 2>/dev/null)" || exit 0
case "$top" in
    */.worktrees/*)
        name="${top#*"/.worktrees/"}"
        printf "wt:%s" "$name"
        ;;
esac
'''
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[$output]($style)"
style = "bold purple"
shell = ["bash", "--noprofile", "--norc"]

